apiVersion: v1
kind: Service
metadata:
  name: {{ include "self-service-agent.fullname" . }}
  labels: {{- include "self-service-agent.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector: {{- include "self-service-agent.selectorLabels" . | nindent 8 }}
